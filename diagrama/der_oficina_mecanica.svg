<svg width="1120" height="720" viewBox="0 0 1120 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diagrama entidade relacionamento do sistema Oficina Manager">
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 8; }
      .title { fill: #1f2937; font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; }
      .field { fill: #374151; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .key { fill: #0f766e; font-weight: 700; }
      .line { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .label { fill: #475569; font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 700; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="720"/>
  <text x="40" y="44" class="title" style="font-size: 26px;">DER - Oficina Manager</text>

  <rect class="box" x="60" y="100" width="250" height="205"/>
  <text class="title" x="84" y="134">CLIENTES</text>
  <text class="field key" x="84" y="170">PK id</text>
  <text class="field" x="84" y="196">nome</text>
  <text class="field key" x="84" y="222">UK cpf</text>
  <text class="field" x="84" y="248">telefone</text>
  <text class="field" x="84" y="274">email</text>

  <rect class="box" x="430" y="100" width="250" height="225"/>
  <text class="title" x="454" y="134">VEICULOS</text>
  <text class="field key" x="454" y="170">PK id</text>
  <text class="field key" x="454" y="196">FK cliente_id</text>
  <text class="field key" x="454" y="222">UK placa</text>
  <text class="field" x="454" y="248">marca</text>
  <text class="field" x="454" y="274">modelo</text>
  <text class="field" x="454" y="300">ano</text>

  <rect class="box" x="800" y="100" width="250" height="245"/>
  <text class="title" x="824" y="134">ORDENS_SERVICO</text>
  <text class="field key" x="824" y="170">PK id</text>
  <text class="field key" x="824" y="196">FK veiculo_id</text>
  <text class="field key" x="824" y="222">FK servico_id</text>
  <text class="field" x="824" y="248">data_abertura</text>
  <text class="field" x="824" y="274">status</text>
  <text class="field" x="824" y="300">valor_total</text>
  <text class="field" x="824" y="326">observacoes</text>

  <rect class="box" x="430" y="440" width="250" height="165"/>
  <text class="title" x="454" y="474">SERVICOS</text>
  <text class="field key" x="454" y="510">PK id</text>
  <text class="field key" x="454" y="536">UK nome</text>
  <text class="field" x="454" y="562">descricao</text>
  <text class="field" x="454" y="588">valor_base</text>

  <rect class="box" x="60" y="440" width="250" height="165"/>
  <text class="title" x="84" y="474">USUARIOS</text>
  <text class="field key" x="84" y="510">PK id</text>
  <text class="field" x="84" y="536">nome</text>
  <text class="field key" x="84" y="562">UK email</text>
  <text class="field" x="84" y="588">senha_hash</text>

  <path class="line" d="M310 200 C360 200 380 200 430 200"/>
  <text class="label" x="332" y="186">1:N possui</text>

  <path class="line" d="M680 210 C725 210 750 210 800 210"/>
  <text class="label" x="702" y="196">1:N recebe</text>

  <path class="line" d="M680 520 C755 520 760 300 800 300"/>
  <text class="label" x="714" y="470">1:N compoe</text>
</svg>
